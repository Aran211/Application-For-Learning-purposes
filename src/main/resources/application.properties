spring.application.name=Ron-project

spring.datasource.url=${APP_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ron_project}
spring.datasource.username=${APP_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${APP_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.expiration=PT24H

spring.data.web.pageable.default-page-size=50
spring.data.web.pageable.max-page-size=100

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

app.football.api-base-url=${APP_FOOTBALL_API_BASE_URL:https://api.football-data.org}
app.football.api-token=${APP_FOOTBALL_API_TOKEN:}
app.football.competition-codes=CL
